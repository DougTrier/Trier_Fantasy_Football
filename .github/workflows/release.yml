name: Release — Tauri Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:
  build-tauri:
    name: Build Tauri App
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate build info
        run: node scripts/generate_build_info.js

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Trier Fantasy Football ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG or commits for details.'
          releaseDraft: true
          prerelease: false
          args: --bundles msi,nsis
