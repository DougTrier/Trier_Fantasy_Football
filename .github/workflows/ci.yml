name: CI — Typecheck, Lint & Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  # Security audit runs first so vulnerable deps block everything downstream
  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fail the build on any high or critical severity CVE
      - name: Run npm audit
        run: npm audit --audit-level=high

  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: node scripts/generate_build_info.js

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck-lint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

