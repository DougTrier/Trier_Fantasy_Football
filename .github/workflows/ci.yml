name: CI — Typecheck & Lint

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate build info
        run: node scripts/generate_build_info.js

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint
